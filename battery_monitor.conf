# Configuração Zabbix Agent 2 para Monitoramento de Baterias UPLFP48100
# Arquivo: /etc/zabbix/zabbix_agent2.d/battery_monitor.conf

### USERPARAMETERS ###

# Discovery de baterias (retorna JSON LLD)
UserParameter=battery.discover,/usr/local/bin/battery_zabbix.py --discover --port /dev/ttyUSB0

# Coleta de métricas individuais por bateria
# Uso: battery.metric[<battery_id>,<metric_name>]
# Exemplo: battery.metric[1,voltage] retorna tensão da bateria ID 1
UserParameter=battery.metric[*],/usr/local/bin/battery_zabbix.py --id $1 --metric $2 --port /dev/ttyUSB0

### MÉTRICAS DISPONÍVEIS ###
# voltage      - Tensão total (V)
# current      - Corrente (A)
# power        - Potência (W)
# soc          - State of Charge (%)
# soh          - State of Health (%)
# temp_max     - Temperatura máxima (°C)
# cell_min     - Tensão mínima das células (V)
# cell_max     - Tensão máxima das células (V)
# cell_avg     - Tensão média das células (V)
# cell_diff    - Diferença entre células (V)
# cell_count   - Número de células
# status       - Status (0=standby, 1=charging, 2=discharging)

### CONFIGURAÇÕES ###
# Timeout padrão para execução de scripts
# Timeout=30

### NOTAS ###
# 1. Ajuste o caminho /dev/ttyUSB0 para sua porta serial
# 2. Certifique-se de que o usuário zabbix tem permissão para acessar a porta serial:
#    sudo usermod -a -G dialout zabbix
# 3. O script battery_zabbix.py deve estar em /usr/local/bin/ com permissão de execução:
#    sudo chmod +x /usr/local/bin/battery_zabbix.py
# 4. Reinicie o Zabbix Agent 2 após modificar este arquivo:
#    sudo systemctl restart zabbix-agent2
